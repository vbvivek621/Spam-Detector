<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Spam Detector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { 
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        /* PANDA - BIG & VISIBLE */
        .panda-box {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            background: #feca57;
            box-shadow: 0 10px 30px rgba(254,202,87,0.4);
            transition: all 0.5s ease;
            animation: float 3s ease-in-out infinite;
        }
        
        /* SPAM ANIMATION */
        .panda-box.spam {
            background: #ff6b6b;
            animation: shake 0.6s infinite, pulseRed 0.3s infinite;
            box-shadow: 0 0 30px #ff6b6b;
            transform: scale(1.1);
        }
        
        /* SAFE ANIMATION */
        .panda-box.safe {
            background: #00b894;
            animation: bounce 0.8s ease 2, float 3s ease-in-out infinite;
            box-shadow: 0 0 30px #00b894;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-15px) rotate(-3deg); }
            75% { transform: translateX(15px) rotate(3deg); }
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }
        @keyframes pulseRed {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        form { margin: 30px 0; }
        textarea {
            width: 100%;
            height: 120px;
            padding: 20px;
            border: 3px solid #ddd;
            border-radius: 15px;
            font-size: 16px;
            font-family: inherit;
            margin-bottom: 20px;
        }
        textarea:focus { border-color: #667eea; outline: none; }
        
        button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.6); }
        
        .result {
            margin-top: 30px;
            padding: 25px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }
        .result.show {
            opacity: 1;
            transform: translateY(0);
        }
        .result.spam {
            background: #ff6b6b;
            color: white;
            box-shadow: 0 10px 30px rgba(255,107,107,0.5);
        }
        .result.safe {
            background: #00b894;
            color: white;
            box-shadow: 0 10px 30px rgba(0,184,148,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ AI Spam Detector</h1>
        <p style="color: #666; margin-bottom: 20px;">97% Accurate | Free Check</p>
        
        <!-- 🐼 FIXED PANDA - Jinja2 classes direct -->
        <div id="panda" class="panda-box 
            {% if prediction %}
                {% if 'SPAM' in prediction %}spam{% else %}safe{% endif %}
            {% endif %}">🐼</div>
        
        <form method="post" action="/check">
            <textarea name="message" placeholder="यहाँ SMS/Email paste करें..." required></textarea>
            <br>
            <button type="submit">🔍 चेक करें</button>
        </form>
        
        {% if prediction %}
        <div id="result" class="result 
            {% if 'SPAM' in prediction %}spam{% else %}safe{% endif %} show">
            {{ prediction }}<br>
            <small>{{ alert_text }}</small>
        </div>
        {% endif %}
    </div>
</body>
</html>
